# nginx config for the production frontend.
# - Serves the built SPA, falling back to index.html for client-side routes.
# - Reverse-proxies /api to the backend container (one origin, no CORS).
# - Serves the self-hosted EmulatorJS engine and the isolated emulator host page.
# - Sets cache headers so the app updates promptly while still caching the
#   content-hashed assets aggressively.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text responses (the JS/CSS bundle, JSON, SVG, WASM). A real
    # transfer win on every load. Content-hashed assets are immutable, so
    # vary/proxied is safe.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/manifest+json application/wasm;

    # API → backend container. "backend" resolves on the compose network.
    # The /api prefix is preserved (backend routes live under /api).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # The service worker and the HTML shell must never be cached by the browser,
    # or users would be stuck on a stale app after a deploy. The SW itself
    # manages updating the precached, content-hashed assets.
    #
    # Content-Security-Policy + security headers are set on the app shell. The
    # shell is served by TWO locations: the explicit `= /index.html` route AND
    # the `/` try_files fallback below (which is what a fresh load of a deep
    # client-side route actually hits). nginx's `add_header` does NOT inherit
    # into a location that defines its OWN add_header, so to cover every HTML
    # response the headers must be repeated in BOTH blocks. Kept identical.
    #
    # CSP notes: allow our inline theme script ('unsafe-inline'); blob: for the
    # PWA worker; same-origin everything else (API, the emulator.html frame).
    # frame-ancestors 'self' blocks clickjacking without needing X-Frame-Options.
    # (EmulatorJS runs in its own same-origin emulator.html document, which has
    # its own response and its own, looser CSP below — not this policy.)
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline' blob:; img-src 'self' data: blob:; font-src 'self' data: blob:; connect-src 'self' blob:; frame-src 'self' blob:; child-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }
    # The emulator host page boots the engine from query params; keep it fresh so
    # config changes (game name, save-state defaults) land without a stale cache.
    #
    # Its OWN CSP (this document isn't governed by the app-shell policy above).
    # EmulatorJS needs more than the shell: WASM cores ('wasm-unsafe-eval' + the
    # Emscripten 'unsafe-eval' fallback), blob workers, and the page's inline boot
    # script ('unsafe-inline'). The policy bounds where SCRIPT can load from —
    # 'self' (the pinned /emulatorjs/ engine) plus the one official CDN — so the
    # ?data= param can no longer pull a loader from an arbitrary origin
    # (defence-in-depth behind the JS allowlist in emulator.html). The engine is
    # single-threaded WASM, so NO cross-origin isolation (COOP/COEP) is needed.
    location = /emulator.html {
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://cdn.emulatorjs.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; font-src 'self' data: blob:; connect-src 'self' data: blob: https://cdn.emulatorjs.org; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    # Content-hashed build assets can be cached for a long time.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Self-hosted EmulatorJS engine/cores (pinned version) — large and static,
    # so cache them hard. Served straight from disk (not a SPA route).
    location /emulatorjs/ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA: serve the requested file if it exists, else hand back index.html so
    # React Router can handle the route. A fresh load of any deep route falls
    # through here and is served the index.html shell — so the CSP + security
    # headers MUST be repeated on this location too (add_header does not inherit
    # from `= /index.html`). Kept byte-identical to the values above.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline' blob:; img-src 'self' data: blob:; font-src 'self' data: blob:; connect-src 'self' blob:; frame-src 'self' blob:; child-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
