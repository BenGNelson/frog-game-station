<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Frog Game Station">
  <!-- The flat two-tone frog mark on the pond ground — matches frogMarkMarkup()
       in src/frog/art.js (change the frog once, it changes everywhere). Body +
       eye domes in jade; the pupils are knocked back to the ground colour so the
       silhouette still reads as one shape when shrunk to 16px. -->
  <rect width="100" height="100" rx="22" fill="#05110D"/>
  <g transform="translate(0 -2)">
    <ellipse cx="50" cy="62" rx="37" ry="30" fill="#34D399"/>
    <circle cx="28" cy="30" r="16" fill="#34D399"/>
    <circle cx="72" cy="30" r="16" fill="#34D399"/>
    <circle cx="28" cy="29" r="7" fill="#05110D"/>
    <circle cx="72" cy="29" r="7" fill="#05110D"/>
  </g>
</svg>
